{% extends "pusat_keamanan/base.html" %}

{% block title %}Dashboard{% endblock %}
{#{% block page_title %}DASHBOARD KEAMANAN PUSAT{% endblock %}#}

{% block content %}
<div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 400px));">
  <a href="{{ url_for('dc_laporan_keamanan') }}" style="text-decoration: none;">
    <div class="stat-card blue">
      <div class="stat-icon">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <div class="stat-info">
        <div class="stat-value">{{ laporan_masuk }}</div>
        <div class="stat-label">Laporan Masuk</div>
        <div class="stat-sub">Total laporan keamanan yang tercatat</div>
      </div>
    </div>
  </a>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Sistem Deteksi Senjata Tajam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-card {
      background: #ffffff;
      padding: 44px;
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
      border: 1px solid #eef0f6;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Brand Header */
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .brand-logo {
      height: 72px;
      width: auto;
      object-fit: contain;
    }

    .brand-text {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: -0.01em;
    }

    /* Titles */
    .title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #0f172a;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #64748b;
      text-align: center;
      margin-bottom: 28px;
    }

    /* Alerts */
    .alert {
      padding: 12px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert.danger {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .alert.success {
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    /* Forms */
    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #334155;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #0f172a;
      background: #f8fafc;
      transition: all 0.25s ease;
    }

    .form-input::placeholder {
      color: #94a3b8;
    }

    .form-input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .pw-wrap {
      position: relative;
    }

    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .pw-toggle:hover {
      color: #475569;
    }

    /* Form Options */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      margin-bottom: 24px;
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #475569;
      cursor: pointer;
      white-space: nowrap;
    }

    .checkbox-wrap input {
      accent-color: #2563eb;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .forgot-link {
      font-size: 0.85rem;
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
      white-space: nowrap;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px 16px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, .3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Brand -->
      <div class="brand">
        <img src="{{ url_for('static', filename='assets/Securemart.png') }}" class="brand-logo" alt="SecureMart Logo">
        <div class="brand-text">SecureMart</div>
      </div>



      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for category, message in messages %}
      <div class="alert {{ category }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          {% if category == 'danger' %}
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
          {% else %}
          <polyline points="20 6 9 17 4 12" />
          {% endif %}
        </svg>
        {{ message }}
      </div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}" id="form-login">

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" placeholder="name@example.com"
            value="{{ request.form.get('email','') }}" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="pw-wrap">
            <input type="password" name="password" id="password" class="form-input" placeholder="••••••••" required>
            <button type="button" class="pw-toggle" id="toggle-pw" title="Show Password">
              <svg id="eye-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                viewBox="0 0 24 24">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrap">
            <input type="checkbox" name="remember"> Remember me
          </label>
        </div>

        <button type="submit" class="btn" id="btn-login">
          <span id="btn-text">Login</span>
          <span class="spinner" id="spinner"></span>
        </button>

        <div style="text-align: center; margin-top: 24px; font-size: 0.85rem; font-weight: 500; color: #0f172a;">
          Belum punya akun? <a href="{{ url_for('register') }}" class="forgot-link">Daftar</a>
        </div>

      </form>
    </div>
  </div>

  <script>
    // Eye toggle for password
    const togglePw = document.getElementById('toggle-pw');
    const pwInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eye-icon');

    // SVG Paths
    const eyeClosed = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    const eyeOpen = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';

    togglePw.addEventListener('click', () => {
      const isPass = pwInput.type === 'password';
      pwInput.type = isPass ? 'text' : 'password';
      eyeIcon.innerHTML = isPass ? eyeOpen : eyeClosed;
    });

    document.getElementById('form-login').addEventListener('submit', function (e) {
      const email = document.getElementsByName('email')[0].value.trim();
      const pw = document.getElementById('password').value.trim();
      if (!email || !pw) return;

      const btn = document.getElementById('btn-login');
      const txt = document.getElementById('btn-text');
      const sp = document.getElementById('spinner');

      btn.style.pointerEvents = 'none';
      txt.textContent = 'Authenticating...';
      sp.style.display = 'block';
    });
  </script>
</body>

</html>
